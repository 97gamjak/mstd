name: Static Analysis

on:
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cppcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cppcheck
        run: |
          sudo apt update
          sudo apt install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all \
              --enable=performance \
              --enable=style \
              --enable=information \
              --enable=portability \
              --error-exitcode=1 \
              --suppressions-list=.cppcheck.suppress \
              --suppress=missingIncludeSystem \
              --inline-suppr \
              --inconclusive \
              -I include \
              include test

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-tidy and dependencies
        run: |
          sudo apt update
          sudo apt install -y clang-tidy cmake g++

      - name: Generate compile_commands.json
        run: |
          cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          test -f build/compile_commands.json && cp build/compile_commands.json .

      - name: Run clang-tidy on test directory
        run: |
          find test -name '*.cpp' -not -path '*/external/*' | xargs -r clang-tidy -p . --warnings-as-errors='*'

      - name: Run clang-tidy on include directory
        run: |
          find include -name '*.hpp' | xargs -r clang-tidy -p . --warnings-as-errors='*' --suppress=AnalyzeMacros
